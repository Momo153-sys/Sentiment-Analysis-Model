<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sentiment Analyzer</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      font-size: 16px;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ddd;
    }
  </style>
</head>

<body>
  <h1>Sentiment Analyzer</h1>

  <textarea id="text" placeholder="Write something..."></textarea>
  <br/>
  <button onclick="analyze()">Analyze</button>

  <div class="result" id="result"></div>

  <script>
    async function analyze() {
      const text = document.getElementById("text").value;

      const response = await fetch("http://127.0.0.1:4000/analyze", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });

      const data = await response.json();

      if (data.error) {
        document.getElementById("result").innerHTML = data.error;
        return;
      }

      document.getElementById("result").innerHTML = `
        <strong>Sentiment:</strong> ${data.sentiment} <br/>
        <strong>Positive:</strong> ${data.scores.pos} <br/>
        <strong>Neutral:</strong> ${data.scores.neu} <br/>
        <strong>Negative:</strong> ${data.scores.neg} <br/>
        <strong>Compound:</strong> ${data.scores.compound}
      `;
    }
  </script>
</body>
</html>
